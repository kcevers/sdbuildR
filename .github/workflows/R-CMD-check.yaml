# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master, stockflow]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    # Experimental configs (e.g. newest Julia) report without blocking
    continue-on-error: ${{ matrix.config.experimental || false }}

    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }}, Julia ${{ matrix.config.julia }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release', julia: '1.12.6'}
          - {os: windows-latest, r: 'release', julia: '1.12.6'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release', julia: '1.12.6'}
          - {os: ubuntu-latest,   r: 'release', julia: '1.12.6'}
          - {os: ubuntu-latest,   r: 'oldrel-1', julia: '1.12.6'}
          # Minimum supported Julia version (from inst/Project.toml: julia = "1.10")
          - {os: ubuntu-latest,   r: 'release', julia: '1.10'}
          # Newest Julia (latest 1.x); experimental — may surface upstream issues
          - {os: ubuntu-latest,   r: 'release', julia: '1', experimental: true}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: "true"
      SDBUILDR_INSTALL_JULIA_ENV: "true"
      SDBUILDR_CREATE_TEST_FIGS: "true"

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # Julia version varies across the matrix (min, pinned, newest)
      - name: Set up Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.config.julia }}

      # Cache the Julia depot (downloaded packages + precompiled cache) so the
      # environment install during checks is fast on repeat runs. The cache key
      # includes the matrix config, so each Julia version gets its own cache.
      - uses: julia-actions/cache@v2

      # Print Julia environment variables
      - name: Print Julia environment
        run: |
          echo "JULIA_BINDIR: $JULIA_BINDIR"
          echo "PATH: $PATH"
          which julia
          julia --version
        shell: bash

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
