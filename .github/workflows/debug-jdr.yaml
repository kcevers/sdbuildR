# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [stockflow]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: debug-jdr.yaml

permissions: read-all

jobs:
  debug-jdr:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: "true"
      SDBUILDR_INSTALL_JULIA_ENV: "true"
      SDBUILDR_CREATE_TEST_FIGS: "true"
      SDBUILDR_VIGNETTE_TRACE_FILE: "jdr-render-trace.log"

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, any::rmarkdown, local::.
          needs: website

      # Necessary to prevent CHOLMOD error
      - name: Set up Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: '1.12.6'

      - name: Print Julia environment
        run: |
          echo "JULIA_BINDIR: $JULIA_BINDIR"
          echo "PATH: $PATH"
          which julia
          julia --version
        shell: bash

      - name: Render jdr article only
        run: |
          : > "$SDBUILDR_VIGNETTE_TRACE_FILE"
          tail -n +1 -f "$SDBUILDR_VIGNETTE_TRACE_FILE" &
          trace_tail_pid=$!

          cleanup() {
            status=$?
            trap - EXIT TERM INT
            echo "::group::Final jdr render trace"
            if [ -f "$SDBUILDR_VIGNETTE_TRACE_FILE" ]; then
              cat "$SDBUILDR_VIGNETTE_TRACE_FILE"
            else
              echo "No vignette trace file found at $SDBUILDR_VIGNETTE_TRACE_FILE"
            fi
            echo "::endgroup::"
            kill "$trace_tail_pid" 2>/dev/null || true
            exit "$status"
          }

          trap cleanup EXIT
          trap 'echo "Received termination signal while rendering jdr"; cleanup' TERM INT

          Rscript -e 'pkgload::load_all(); rmarkdown::render("vignettes/articles/jdr.Rmd", output_dir = tempfile(), quiet = FALSE)'
        shell: bash

      - name: Upload jdr trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jdr-render-trace
          path: ${{ env.SDBUILDR_VIGNETTE_TRACE_FILE }}
          if-no-files-found: ignore
